# Configuración del bot cuantitativo S&P 500.
# Todo lo que NO es un secreto vive aquí (los secretos van en .env).
# Cambiar un parámetro de trading/investigación nunca debe requerir tocar código.
#
# IMPORTANTE (protocolo anti-sobreajuste): la sección `research` es el
# PRE-REGISTRO del protocolo de investigación — split, grids y criterios de
# éxito se fijaron ANTES de mirar cualquier resultado (2026-07-11, ver
# docs/research/2026-07-11_protocolo_sp500.md). Cambiarlos después de ver
# resultados invalida la validación entera.

market:
  benchmark_symbol: "SPY"    # ETF del S&P 500: retorno TOTAL (auto_adjust reinvierte dividendos)
  index_symbol: "^GSPC"      # índice de PRECIO (historia larga desde 1927, sin dividendos)
  tbill_symbol: "^IRX"       # T-bill 13 semanas (yield anualizado %): retorno del cash
  timeframe: "1d"            # velas diarias — nada intradía (lección cripto: ruido+costos)

data:
  dir: "data/sp500"                    # raíz de los parquet descargados
  start_date: "1990-01-01"             # inicio de la descarga (constituyentes: cobertura real desde ~1996)
  # Constituyentes HISTÓRICOS del índice (anti sesgo de supervivencia): CSV con
  # la membresía punto-en-el-tiempo, gratis. El downloader resuelve el archivo
  # más reciente del repo vía la API de GitHub.
  constituents_repo: "fja05680/sp500"
  batch_size: 50                       # tickers por llamada de descarga (yfinance agrupa)
  pause_seconds: 1.0                   # pausa entre lotes (cortesía con el rate limit)
  extra_symbols: ["VUSTX"]             # proxy bonos Tesoro largo (fondo Vanguard, 1986→): pata defensiva de la rotación

risk:
  # Contexto ACCIONES (cuenta cash, sin apalancamiento, sin funding):
  risk_per_trade_pct: 0.5    # % del capital arriesgado por operación (dist. al stop)
  max_open_positions: 10     # tope de posiciones simultáneas
  max_daily_loss_pct: 2.0    # al tocarlo, no se abren entradas hasta el día siguiente
  max_drawdown_pct: 15.0     # kill switch: latcha, requiere reset manual
  atr_stop_multiplier: 2.0   # SL = entrada − 2·ATR(14) (acciones diarias: 1.5 era de cripto 5m)
  atr_period: 14
  take_profit_rr: 2.0        # solo si let_winners_run=false (techo fijo de ganancia)
  let_winners_run: true      # sin techo: sale por señal o stop (estructura trend-following)
  allow_short: false         # cuenta cash: sin cortos (borrow/margen fuera de alcance $0)
  allow_fractional_shares: false  # brokers clásicos: acciones enteras (floor, nunca redondear arriba)

quant:
  # Señal de referencia del motor (score EMA/SMA-cross + RSI). Los deciders de
  # investigación la IGNORAN (traen su propia señal); se conserva porque el
  # motor la precalcula y porque es la señal "por defecto" documentada.
  ma_type: "sma"
  ema_fast_period: 50
  ema_slow_period: 200
  rsi_period: 14
  ema_weight: 1.0            # 100% cruce de medias, 0% RSI
  score_squash_factor: 50.0

backtest:
  # Costos por lado (entrada y salida), en % del notional:
  # comisión 0 (brokers retail EE.UU. cobran $0 en acciones/ETF) +
  # slippage 0.02% = 2 pb (megacaps/ETF líquidos, órdenes pequeñas retail).
  # La sensibilidad a costos peores (5 pb) se corre aparte (research.slippage_stress_pct).
  initial_capital: 10000.0
  commission_pct: 0.0
  slippage_pct: 0.02
  slippage_atr_multiplier: 0.0   # sin componente dinámico: universo líquido, diario
  entry_threshold: 0.5
  exit_threshold: 0.1
  take_profit_rr: 2.0
  allow_short: false             # coherente con risk.allow_short (cuenta cash)

# ============================ PRE-REGISTRO ============================
# Protocolo de investigación S&P 500 (fijado 2026-07-11 ANTES de correr nada).
# El documento hermano con la justificación completa:
# docs/research/2026-07-11_protocolo_sp500.md
research:
  # ---- Split temporal único para TODOS los experimentos ----
  # TRAIN: fecha < test_start_date | TEST: fecha >= test_start_date (se mide UNA vez).
  test_start_date: "2015-01-01T00:00:00Z"
  # ---- Criterios de éxito (TODOS a la vez, sobre el TEST) ----
  success_sharpe_min: 0.5        # Sharpe anualizado neto de costos
  bootstrap_iterations: 5000     # remuestreo con reemplazo de las operaciones/meses
  bootstrap_ci: 0.90             # el CI al 90% debe EXCLUIR el cero
  concentration_max: 0.60        # top 10% de operaciones aporta <60% de la ganancia
  # además: estable en ambas mitades del test Y Sharpe > buy-and-hold del mismo universo.
  # ---- Convenciones ----
  slippage_stress_pct: 0.05      # sensibilidad: costos 5 pb/lado (además del caso base 2 pb)
  cash_earns_tbill: true         # el cash fuera de mercado devenga ^IRX (si no, se subestima el timing)
  # ---- Familia 1: momentum cross-sectional (Jegadeesh-Titman 1993) ----
  xs_momentum:
    lookback_months_grid: [3, 6, 12]   # formación J-T clásica
    skip_months_grid: [0, 1]           # saltar el último mes (reversión de corto plazo)
    top_n_grid: [30, 50]               # cartera larga: top-N del ranking (~decil de 500)
    min_coverage: 0.60                 # fracción mínima de constituyentes con precio para que una fecha cuente
    min_history_days: 280              # historia mínima del ticker para entrar al ranking (13 meses)
  # ---- Familia 2: TSMOM sobre el índice (Moskowitz-Ooi-Pedersen 2012) ----
  # Definición idéntica al Frente C de 2026-07-07 (comparabilidad): retorno de
  # los últimos L meses EXCLUYENDO el último; long si >0, si no cash (long-only).
  tsmom_index:
    lookback_months_grid: [3, 6, 12]
  # ---- Familia 3: timing por media móvil (Faber 2007) ----
  ma_timing:
    sma_days_grid: [100, 200]          # precio vs SMA, evaluado a fin de mes
    cross_pairs: [[50, 200]]           # golden cross clásico, evaluado a diario
  # ---- Familia 4: reversión de corto plazo RSI-2 (Connors 2008) ----
  rsi_reversion:
    rsi_period: 2
    entry_grid: [5.0, 10.0]            # RSI2 < esto → LONG (dip)
    exit_grid: [50.0, 70.0]            # RSI2 > esto → salir
    trend_sma_days: 200                # solo por encima de la SMA200 (no cazar cuchillos)
  # ---- Familia 5: rotación dual-momentum mensual (Antonacci 2014, GEM) ----
  dual_momentum:
    lookback_months: 12                # única config (sin grid: definición canónica del libro)
    bond_symbol: "VUSTX"               # pata defensiva: Tesoro largo (fondo, historia desde 1986)
