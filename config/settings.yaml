# Configuración de la estrategia y el riesgo.
# Todo lo que NO es un secreto vive aquí (los secretos van en .env).
# Cambiar un parámetro de trading nunca debe requerir tocar código.

market:
  symbols: ["BTCUSDT", "ETHUSDT"]
  timeframe: "5m"            # vela base de trabajo
  htf_timeframe: "1h"        # timeframe superior para contexto/tendencia

risk:
  risk_per_trade_pct: 1.0    # % del capital arriesgado por operación
  max_open_positions: 3
  max_daily_loss_pct: 3.0    # al tocarlo, el bot se detiene hasta el día siguiente
  max_drawdown_pct: 10.0     # kill switch: requiere reinicio manual
  atr_stop_multiplier: 1.5   # SL = entrada -/+ 1.5 * ATR(14)
  atr_period: 14
  # objetivo = RR × distancia_al_stop. Copia de simulación del backtest vive en
  # backtest.take_profit_rr; esta es la del camino EN VIVO (Risk Manager).
  take_profit_rr: 2.0
  # Confianza del sentimiento por debajo de este umbral → tamaño reducido.
  low_confidence_threshold: 0.4
  low_confidence_size_factor: 0.5   # multiplicador cuando la confianza es baja
  # Circuit breaker (a): precio más viejo que esto (s) → no abrir nuevas entradas.
  stale_feed_seconds: 30
  # Feed obsoleto = sin vela por más de stale_feed_intervals × intervalo (o
  # stale_feed_seconds, el mayor). Escala con el timeframe: en 5m son 10 min.
  stale_feed_intervals: 2.0
  # --- Futuros USD-M: apalancamiento y margen ---
  # Auto-límite de apalancamiento. Aunque el exchange permita 20x+, el bot jamás
  # usa más de esto. Nada de apalancamiento de casino.
  max_leverage: 3
  # Margen inicial agregado máximo como % del wallet_balance. El (100 - este)% es
  # colchón para fluctuaciones de PnL no realizado y comisiones de liquidación.
  max_portfolio_margin_pct: 85.0

confluence:
  quant_strong_threshold: 0.5      # |señal quant| para considerarla "fuerte"
  sentiment_confirm_threshold: 0.3 # |sentimiento| mínimo para confirmar
  reduced_size_factor: 0.5         # tamaño al operar sin confirmación de sentimiento
  # Binance Futuros USD-M: los cortos son nativos. En vivo va en true → el bot
  # opera de forma simétrica (LONG y SHORT). El gate sigue siendo config: poner
  # false lo volvería long-only sin tocar código.
  allow_short: true

sentiment:
  rss_feeds:
    - "https://www.coindesk.com/arc/outboundfeeds/rss/"
    - "https://cointelegraph.com/rss"
    - "https://decrypt.co/feed"
  poll_interval_seconds: 120
  claude_model: "claude-haiku-4-5-20251001"
  heuristic_weight: 0.7        # peso del diccionario cripto vs. VADER (VADER = 1 - esto)
  escalate_score_threshold: 0.3  # |score_local| >= esto → llamar a Claude
  max_news_age_hours: 24         # ignorar noticias más viejas que esto

quant:
  ema_fast_period: 9
  ema_slow_period: 21
  rsi_period: 14
  ema_weight: 0.6   # peso EMA en el score combinado; peso RSI = 1 - ema_weight

backtest:
  # Costos: se cobran en CADA lado (entrada y salida). Una estrategia que solo
  # gana sin costos no es una estrategia. Valores por defecto conservadores;
  # ajustables sin tocar código.
  initial_capital: 10000.0   # USDT ficticios de partida
  commission_pct: 0.04       # comisión taker por lado (% del notional) — Binance futures ≈ 0.04
  slippage_pct: 0.02         # deslizamiento adverso fijo por lado (%)
  slippage_atr_multiplier: 0.1  # slippage extra proporcional a la volatilidad: k·ATR/precio. 0 = solo el fijo
  # Reglas de entrada/salida de la simulación (la estrategia emite score en [-1,1]).
  entry_threshold: 0.5       # |score| para abrir posición (idea de "señal fuerte")
  exit_threshold: 0.1        # cierre por debilidad: |score| cae por debajo de esto
  take_profit_rr: 2.0        # objetivo = RR × distancia_al_stop (riesgo:beneficio 1:RR)
  allow_short: true          # operar también en corto, no solo en largo

edge:
  # Diagnóstico del edge de la señal quant (backtest.run_edge). NO afecta al
  # trading en vivo: solo mide si la señal predice el retorno futuro.
  forward_horizons: [1, 4, 12, 24]   # velas hacia adelante a las que medir el IC
  n_quantiles: 5                     # cubos para la tabla de monotonicidad señal→retorno

# --- Laboratorio de estrategia (Sprint de investigación quant) ---
# Escáner multi-activo de arquetipos. Todo parámetro vive aquí (cero hardcoding).
scan:
  symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT", "LINKUSDT"]
  history_days: 1095            # ~3 años de histórico a descargar/backtestear
  walk_forward_folds: 4         # tramos contiguos para el test de consistencia
  edge_profit_factor_min: 1.15  # PF mínimo (con expectancy>0) para declarar "edge"

mean_reversion:
  # Arquetipo 2 (anti-chop): Bollinger + RSI en extremos; salida en la media.
  bb_period: 20
  bb_num_std: 2.0
  rsi_oversold: 30.0            # RSI < esto + banda inferior → LONG
  rsi_overbought: 70.0          # RSI > esto + banda superior → SHORT

breakout:
  # Arquetipo 3 (ruptura de volatilidad): Donchian + filtro de volumen.
  donchian_period: 20           # canal de ENTRADA: máx/mín de los N previos
  exit_donchian_period: 10      # canal de SALIDA trailing (Turtle): más corto que el de entrada
  volume_ma_period: 20          # media de volumen para el filtro de confirmación
  volume_multiplier: 1.0        # volumen de ruptura > este × media → válida
  atr_filter_period: 20         # ventana de la media de ATR del filtro de volatilidad
  atr_expansion_mult: 1.0       # solo entrar si ATR > este × media(ATR): régimen expansivo

execution:
  # Reconciliación: discrepancia RELATIVA de cantidad por encima de la cual el
  # estado local y el del exchange se consideran desincronizados → halt (cb c).
  reconcile_position_tolerance: 0.001
  # Disparo de stops sobre el precio de MARCA, no el último negociado: un wick de
  # manipulación en un libro fino no activa el stop. Alternativa: CONTRACT_PRICE.
  stop_working_type: "MARK_PRICE"
  # Confirmación del fill de la entrada MARKET antes de colocar SL/TP (una orden
  # de mercado puede responder NEW y llenarse un instante después).
  fill_confirm_retries: 5
  fill_confirm_delay_seconds: 0.3

orchestrator:
  # Velas mínimas en el buffer antes de operar: los indicadores (ema_slow + rsi)
  # necesitan historia para ser fiables; dejamos holgura sobre ese mínimo.
  warmup_candles: 60
  # Observaciones consecutivas de una pierna "desconocida" antes de declarar
  # desincronización y disparar el HALT (circuit breaker c). Absorbe la latencia
  # del WebSocket: una aparición transitoria no detiene el bot, una sostenida sí.
  reconcile_grace_cycles: 3

# --- Señales no-precio (funding rate / basis de futuros) ---
# Edge test de funding/basis. NO afecta al trading: mide si predicen el precio.
funding_edge:
  premium_interval: "1h"                  # granularidad del basis/premium a capturar
  forward_horizons_hours: [8, 24, 72, 168]  # retorno futuro (h): 1 funding, 1d, 3d, 7d
  n_quantiles: 5                          # cubos para la monotonicidad señal→retorno

# --- Momentum cross-sectional (relative strength entre muchos activos) ---
# Factor: retorno de los últimos N días; se rankea el universo y se mide el IC
# del ranking contra el retorno futuro. NO opera: es el edge test del factor.
cross_sectional:
  history_days: 1100            # ~3 años de velas diarias a descargar
  min_history_days: 60          # un activo entra al universo si tiene al menos esto
  momentum_lookback_days: 30    # ventana del momentum (retorno de los últimos N días)
  momentum_skip_days: 0         # saltar los últimos M días (evita reversión de corto plazo)
  vol_adjust: false             # true = momentum dividido por su volatilidad realizada
  vol_lookback_days: 30         # ventana de volatilidad si vol_adjust
  forward_days: 7               # horizonte del retorno futuro a predecir
  rebalance_days: 7             # cada cuántos días se recalcula el ranking (semanal)
  n_quantiles: 5                # quintiles para el spread top-bottom
  min_assets: 10                # cross-section mínima para calcular el IC de una fecha
  # --- Construcción del portafolio long-short de reversión ---
  liquidity_drop_pct: 0.25      # descarta el 25% de menor volumen (microcaps de la cola)
  winsorize_quantile: 0.02      # recorta retornos al percentil 2/98 (ningún activo domina)
  max_weight: 0.10              # tope de peso por activo (10%)

# --- Regímenes de mercado por sentimiento (Fear & Greed como ancla) ---
# Edge test de 3 métodos cuantitativos de sentimiento. NO opera: mide si el F&G
# predice/condiciona retornos. Frecuencia diaria (estabilidad: nada de scalping).
sentiment_regime:
  ext_fear_below: 25        # F&G < 25 = miedo extremo
  fear_below: 45            # [25,45) = miedo
  greed_above: 55           # [55,75) = codicia
  ext_greed_above: 75       # F&G >= 75 = codicia extrema
  forward_days: 7           # horizonte de retorno futuro
  mr_lookback_days: 5       # ventana del dip para la reversión (Método B)
  extreme_abs_threshold: 25 # |F&G-50| >= esto → régimen "extremo" para el gating (B)
  vol_scale_min: 0.3        # exposición mínima en euforia (Método C, vol-scaling)

storage:
  db_path: "data/trading.db"
  candles_dir: "data/candles"
  funding_dir: "data/funding"
  universe_dir: "data/universe"
